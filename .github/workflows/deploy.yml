name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies & build client
        run: |
          npm install
          npm run build

      - name: Copy built client to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "client/dist/,server/,package.json,package-lock.json,schema.sql"
          target: "/home/ec2-user/family_game"
          strip_components: 0

      - name: Restart app on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/family_game

            # Install server dependencies only
            npm install --workspace=server --omit=dev

            # Restart (or start) the app with PM2
            if pm2 list | grep -q "family-game"; then
              pm2 restart family-game
            else
              pm2 start server/index.js --name family-game
              pm2 save
            fi

            echo "Deploy complete — app running on port 9753"
